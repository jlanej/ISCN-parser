name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run test suite
        run: pytest --cov=iscn_parser --cov-report=term-missing

  variations:
    name: Parse all ISCN variations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Convert array samples (PLINK + BED)
        run: |
          iscn-parser -i examples/array_samples.tsv -f cnv -o out/array --strict
          iscn-parser -i examples/array_samples.tsv -f bed -o out/array.bed --strict

      - name: Convert karyotype samples (GRCh37)
        run: iscn-parser -i examples/karyotype_samples.tsv -b GRCh37 -f cnv -o out/karyotype --strict

      - name: Ensure malformed input does not crash the parser
        run: |
          iscn-parser -i tests/data/malformed_samples.tsv -b GRCh37 -f cnv -o out/malformed
          test -f out/malformed.cnv

      - name: Show produced outputs
        run: |
          ls -l out
          head -n 5 out/array.cnv

  docker:
    name: Build Docker image and run demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t iscn-parser:ci .

      - name: Smoke test the image
        run: |
          docker run --rm iscn-parser:ci --version
          docker run --rm iscn-parser:ci \
            --string "arr[GRCh37] 1p36.33p36.31(849466_6015936)x1" --quiet

      - name: Run bundled demo inside the image
        run: |
          docker run --rm --entrypoint bash iscn-parser:ci examples/run_demo.sh /tmp/out
